<svg width="191" height="24" viewBox="0 0 191 24" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff6b6b;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#ff8e8e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ff6b6b;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="1" dy="1" stdDeviation="1" flood-color="#00000020"/>
    </filter>
  </defs>
  
  <!-- Elemento decorativo (açaí berry) -->
  <circle cx="12" cy="12" r="8" fill="url(#textGradient)" filter="url(#shadow)"/>
  <circle cx="12" cy="12" r="6" fill="#fff" opacity="0.3"/>
  <circle cx="10" cy="10" r="2" fill="#fff" opacity="0.6"/>
  
  <!-- Texto "Helô" -->
  <text x="28" y="17" font-family="'Arial Black', Arial, sans-serif" font-size="16" font-weight="900" fill="url(#textGradient)" filter="url(#shadow)">Helô</text>
  
  <!-- Elemento decorativo adicional -->
  <circle cx="85" cy="8" r="2" fill="#ff8e8e" opacity="0.7"/>
  <circle cx="90" cy="16" r="1.5" fill="#ff6b6b" opacity="0.8"/>
  <circle cx="95" cy="6" r="1" fill="#ff8e8e" opacity="0.6"/>
  
  <!-- Texto complementar (opcional) -->
  <text x="105" y="13" font-family="Arial, sans-serif" font-size="8" font-weight="600" fill="#666">AÇAÍ & DELICIAS</text>
</svg>