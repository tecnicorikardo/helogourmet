<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pagamento Pendente – Hélo Gourmet</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: #f9f7f2; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1.5rem; }
    .card { background: #fff; border-radius: 20px; box-shadow: 0 8px 40px rgba(0,0,0,0.1); padding: 2.5rem 2rem; max-width: 420px; width: 100%; text-align: center; }
    .icone { width: 72px; height: 72px; background: #fef3c7; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 2rem; margin: 0 auto 1.2rem; }
    h1 { font-family: 'Playfair Display', serif; color: #1a3a2a; font-size: 1.5rem; margin-bottom: 0.5rem; }
    p { color: #6b6b6b; font-size: 0.95rem; line-height: 1.5; margin-bottom: 1.2rem; }
    a.btn { display: inline-block; background: #c9a84c; color: #1a3a2a; font-weight: 700; padding: 0.85rem 2rem; border-radius: 50px; text-decoration: none; margin-top: 0.5rem; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icone">⏳</div>
    <h1>Pagamento Pendente</h1>
    <p>Seu pagamento está sendo processado. Assim que confirmado, entre em contato pelo WhatsApp.</p>
    <a href="/" class="btn">Voltar ao Cardápio</a>
  </div>
</body>
</html>
