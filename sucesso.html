<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pagamento Confirmado – Hélo Gourmet</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --verde: #1a3a2a; --dourado: #c9a84c; --fundo: #f9f7f2; --branco: #fff;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--fundo);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }
    .card {
      background: var(--branco);
      border-radius: 20px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.1);
      padding: 2.5rem 2rem;
      max-width: 440px;
      width: 100%;
      text-align: center;
    }
    .icone-sucesso {
      width: 72px; height: 72px;
      background: #d1fae5;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 2rem;
      margin: 0 auto 1.2rem;
    }
    h1 {
      font-family: 'Playfair Display', serif;
      color: var(--verde);
      font-size: 1.6rem;
      margin-bottom: 0.5rem;
    }
    .subtitulo {
      color: #6b6b6b;
      font-size: 0.95rem;
      margin-bottom: 1.5rem;
      line-height: 1.5;
    }
    .info-pedido {
      background: #f0ece3;
      border-radius: 12px;
      padding: 1rem 1.2rem;
      margin-bottom: 1.5rem;
      text-align: left;
    }
    .info-pedido p {
      font-size: 0.85rem;
      color: #444;
      margin-bottom: 0.3rem;
    }
    .info-pedido strong { color: var(--verde); }
    .btn-wpp {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      width: 100%;
      background: #25d366;
      color: #fff;
      font-weight: 700;
      font-size: 1rem;
      padding: 0.95rem;
      border-radius: 50px;
      border: none;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s, transform 0.2s;
      margin-bottom: 0.8rem;
    }
    .btn-wpp:hover { background: #1ebe5d; transform: translateY(-2px); }
    .btn-voltar {
      display: block;
      color: var(--verde);
      font-size: 0.88rem;
      text-decoration: none;
      margin-top: 0.4rem;
      opacity: 0.7;
      transition: opacity 0.2s;
    }
    .btn-voltar:hover { opacity: 1; }
    .contador {
      font-size: 0.78rem;
      color: #aaa;
      margin-top: 1rem;
    }
    .logo-topo {
      font-family: 'Playfair Display', serif;
      color: var(--dourado);
      font-size: 0.85rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 1.5rem;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo-topo">🍽️ Hélo Gourmet</div>
    <div class="icone-sucesso">✅</div>
    <h1>Pagamento Confirmado!</h1>
    <p class="subtitulo">Seu pedido foi recebido. Agora envie o comprovante pelo WhatsApp para confirmarmos a entrega.</p>

    <div class="info-pedido" id="info-pedido">
      <p>🔖 <strong>Pedido:</strong> <span id="span-pedido-id">carregando...</span></p>
      <p>💳 <strong>ID Pagamento:</strong> <span id="span-payment-id">carregando...</span></p>
      <p>📦 <strong>Status:</strong> <span id="span-status">Aprovado</span></p>
    </div>

    <a href="#" class="btn-wpp" id="btn-wpp">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
      Enviar Comprovante pelo WhatsApp
    </a>
    <a href="/" class="btn-voltar">← Voltar ao cardápio</a>
    <p class="contador" id="contador"></p>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyARUPJBEiVdkYh6De-H9EYtq6L77vFPs0A",
      authDomain: "cardapiohelogourmet.firebaseapp.com",
      projectId: "cardapiohelogourmet",
      storageBucket: "cardapiohelogourmet.firebasestorage.app",
      messagingSenderId: "968993366150",
      appId: "1:968993366150:web:327fb9b8ae9bb58fe7f107"
    };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // Pega parâmetros da URL que o Mercado Pago envia
    const params = new URLSearchParams(window.location.search);
    const paymentId  = params.get('payment_id')  || params.get('collection_id') || '—';
    const pedidoId   = params.get('external_reference') || '—';
    const status     = params.get('collection_status') || params.get('status') || 'approved';

    document.getElementById('span-payment-id').textContent = paymentId;
    document.getElementById('span-pedido-id').textContent  = pedidoId;
    document.getElementById('span-status').textContent     = status === 'approved' ? '✅ Aprovado' : status;

    // Busca config do restaurante para pegar o telefone
    async function montarLinkWpp() {
      let telefone = '5500000000000'; // fallback
      let itensTexto = '';

      try {
        const configSnap = await getDoc(doc(db, 'config', 'restaurante'));
        if (configSnap.exists() && configSnap.data().telefone) {
          telefone = configSnap.data().telefone.replace(/\D/g, '');
        }
      } catch(e) { console.warn('Config não carregada', e); }

      // Tenta buscar itens do pedido no Firestore
      if (pedidoId && pedidoId !== '—') {
        try {
          const pedidoSnap = await getDoc(doc(db, 'pedidos', pedidoId));
          if (pedidoSnap.exists()) {
            const pedido = pedidoSnap.data();
            const linhas = (pedido.itens || []).map(i =>
              `• ${i.quantidade}x ${i.nome} — R$ ${(i.preco * i.quantidade).toFixed(2).replace('.', ',')}`
            );
            itensTexto = linhas.join('\n');
          }
        } catch(e) { console.warn('Pedido não carregado', e); }
      }

      // Monta mensagem do WhatsApp
      const msg = [
        '✅ *Pagamento Confirmado – Hélo Gourmet*',
        '',
        `🔖 Pedido: ${pedidoId}`,
        `💳 ID Pagamento MP: ${paymentId}`,
        '',
        itensTexto ? `*Itens do pedido:*\n${itensTexto}` : '',
        '',
        'Por favor, confirme o recebimento e o horário de entrega. Obrigado! 😊'
      ].filter(Boolean).join('\n');

      document.getElementById('btn-wpp').href =
        `https://wa.me/${telefone}?text=${encodeURIComponent(msg)}`;
    }

    montarLinkWpp();

    // Contador regressivo — abre WhatsApp automaticamente em 10s
    let seg = 10;
    const contadorEl = document.getElementById('contador');
    const timer = setInterval(() => {
      seg--;
      contadorEl.textContent = `Abrindo WhatsApp automaticamente em ${seg}s...`;
      if (seg <= 0) {
        clearInterval(timer);
        contadorEl.textContent = '';
        document.getElementById('btn-wpp').click();
      }
    }, 1000);

    // Se o usuário clicar antes, cancela o contador
    document.getElementById('btn-wpp').addEventListener('click', () => {
      clearInterval(timer);
      contadorEl.textContent = '';
    });
  </script>
</body>
</html>
